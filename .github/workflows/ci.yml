name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm-test:
    name: SwiftPM build & test (macOS host)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test (27 tests incl. consent-OFF gate & perf budget)
        run: swift test

  ios-build:
    name: iOS simulator build (UIKit glue)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Build for iOS Simulator
        run: >
          xcodebuild build
          -scheme HeatmapKit
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest'
          CODE_SIGNING_ALLOWED=NO
